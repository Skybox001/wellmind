<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mental Health Chatbot</title>
  <!--<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">-->
</head>

<body>
  <div class="container">
    <h1> Mental Health <br> Chatbot</h1>
    <div class="chatbox">
      <div class="chatbox__messages" id="chat-messages">
        <!-- Chat messages will be dynamically added here -->
      </div>
      <form id="chat-form">
        <input type="text" id="user-input" placeholder="Type a message...">
      </form>
    </div>
  </div>
  <style>
    /* Variables removed as they are not supported in plain CSS */

    * {
      margin: 10px;
      padding: 10px;
      box-sizing: border-box;
    }
    body {
      font-family: 'verdana', sans-serif;
      background: url('/static/images/chatbot-bg.jpg') center center fixed;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .container {
      background: rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: flex-start;
      align-items: center;
      flex-direction: column;
      height: 105vh;
      flex-wrap: nowrap;
      width: 40%;
    }

    h1 {
      text-align: center;
      display: flex;
      height: 140px;
      font-size: 28px;
      width: 450px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.9);
      border-radius: 12px;
      margin-bottom: 1em;
      color: rgb(251, 255, 0);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .chatbox {
      display: flex;
      background: rgba(255, 0, 0, 0.05);
      width: 450px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      flex-direction: column;
      flex-wrap: nowrap;
    }

    .chatbox__messages {
      height: 300px;
      overflow-y: auto;
      padding: 1em;
      background: rgba(34, 233, 24, 0.05);
    }

    .chatbox__messages .chatbox__messages__user-message,
    .chatbox__messages .chatbox__messages__user-message--ind-message {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      margin-bottom: 10px;
      padding: 10px;
      color: floralwhite;
      word-wrap: break-word;
      /* Add this line */
    }

    .chatbox__messages .chatbox__messages__user-message--ind-message {
      text-align: right;
    }

    .name {
      margin-bottom: 5px;
      font-weight: bold;
    }

    .message {
      margin: 0;
    }

    #user-input {
      width: 75%;
      padding: 10px;
      border: none;
      border-top: 1px;
      font-size: 16px;
      background: rgba(242, 255, 0, 0.03);
      /* ✅ Background color */
      color: floralwhite;
      /* ✅ Text color – agar yeh line add karoge */

    }

    #user-input::placeholder {
      color: #ccc;
      font-weight: bold;
      /* light gray placeholder */
    }


    #user-input:focus {
      outline: none;
    }

    #send-button {
      width: 20%;
      padding: 10px;
      border: none;
      background-color: white;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }

    #send-button:hover {
      background-color: #cccccc;
      /* Replace with a valid CSS color */
    }
  </style>

<script>
    document.addEventListener("DOMContentLoaded", function () {
      const chatForm = document.getElementById("chat-form");
      const userInput = document.getElementById("user-input");
      const chatMessages = document.getElementById("chat-messages");

      chatForm.addEventListener("submit", function (event) {
        event.preventDefault();
        const userMessage = userInput.value.trim();
        if (userMessage !== "") {
          // Send user message to the server
          fetch(`/get?msg=${encodeURIComponent(userMessage)}`)
            .then(response => response.json())
            .then(data => {
              // Display user message
              appendMessage("You", userMessage, "user-message");

              // Display bot response
              appendMessage("Ashgen", data, "user-message--ind-message");
            })
            .catch(error => {
              console.error("Error fetching data:", error);
            });

          // Clear input field
          userInput.value = "";
        }
      });

      function appendMessage(name, message, className) {
        const messageContainer = document.createElement("div");
        messageContainer.classList.add("chatbox__messages__" + className);

        const nameElement = document.createElement("p");
        nameElement.classList.add("name");
        nameElement.textContent = name;

        const messageElement = document.createElement("p");
        messageElement.classList.add("message");
        messageElement.textContent = message;

        messageContainer.appendChild(nameElement);
        messageContainer.appendChild(messageElement);
        chatMessages.appendChild(messageContainer);

        // Scroll to the bottom to show the latest message
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
    });
  </script>
</body>

</html>
